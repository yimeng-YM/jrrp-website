<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONIKATA KAYOKO - 鬼方佳代子图片</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<meta name="description" content="随机或按编号获取佳代子图片" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ===== 单色高级感主题（纯黑白灰，白色为唯一强调色）===== */
  :root {
    --bg: #0a0a0b;
    --surface: #101012;
    --text: #f4f4f5;
    --dim: #8a8a90;
    --faint: #56565c;
    --border: rgba(255, 255, 255, 0.10);
    --border-strong: rgba(255, 255, 255, 0.24);
    --accent: #ffffff;
    --on-accent: #0a0a0b;
    --radius: 12px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100dvh;
    color: var(--text);
    background: var(--bg);
    font-family: "Space Grotesk", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: clamp(20px, 4vw, 40px) clamp(16px, 4vw, 32px) 80px;
  }

  /* ===== 顶栏：仅品牌 + 计数 ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .counter {
    font-size: 13px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .counter #curId { color: var(--text); }
  .counter .sep { margin: 0 6px; color: var(--faint); }

  /* ===== 单图舞台 ===== */
  .viewer { margin-top: 26px; }
  .stage {
    position: relative;
    min-height: 48vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    /* 微弱渐变背景，增加质感 */
    background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
  }
  .stage img {
    max-width: 100%;
    max-height: 72vh;
    object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 0.4s var(--ease);
  }
  .stage img.show { opacity: 1; }

  .ph {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--faint);
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .ph.hide { display: none; }
  .spinner {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .roll-counter { display: inline-flex; vertical-align: middle; gap: 0; line-height: 1; }
  .roll-digit { position: relative; display: inline-block; width: 0.65em; height: 1em; overflow: hidden; vertical-align: middle; line-height: 1; }
  .roll-strip { display: block; transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
  .roll-strip span { display: block; height: 1em; line-height: 1; text-align: center; }

  /* ===== 控制条 ===== */
  .controls {
    margin-top: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }
  .btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font: inherit;
    cursor: pointer;
    border-radius: var(--radius);
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.12s var(--ease), color 0.2s var(--ease);
  }
  .btn.icon {
    width: 42px; height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn.icon svg { width: 18px; height: 18px; display: block; }
  .btn:hover { border-color: var(--border-strong); background: rgba(255, 255, 255, 0.04); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    color: var(--on-accent);
    border-color: var(--accent);
  }
  .btn.primary:hover { background: rgba(255, 255, 255, 0.88); border-color: var(--accent); }
  .btn:focus-visible { outline: 2px solid var(--border-strong); outline-offset: 2px; }
  .btn:disabled, .numwrap .go:disabled { opacity: 0.24; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--border); background: transparent; }
  .btn.primary:disabled:hover { background: var(--accent); border-color: var(--accent); }

  .numwrap {
    display: flex;
    align-items: stretch;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.02);
    overflow: hidden;
    transition: border-color 0.2s var(--ease);
  }
  .numwrap:focus-within { border-color: var(--border-strong); }
  .numwrap input {
    width: 92px;
    border: none;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 14px;
    text-align: center;
    padding: 0 10px;
    outline: none;
    font-variant-numeric: tabular-nums;
  }
  .numwrap input::placeholder { color: var(--faint); }
  .numwrap input::-webkit-outer-spin-button,
  .numwrap input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .numwrap .go {
    border: none;
    border-left: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    padding: 0 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: color 0.2s var(--ease);
  }
  .numwrap .go svg { width: 16px; height: 16px; display: block; }
  .numwrap .go:hover { color: var(--text); }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #ffffff;
    border: 1px solid #ffffff;
    color: #0a0a0b;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 520px) {
    .controls { gap: 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="brand">ONIKATA KAYOKO <span style="font-weight: 400; font-size: 14px; color: var(--dim); margin-left: 6px; letter-spacing: 0;">佳代子</span></div>
    <div class="counter"><span id="curId">—</span><span class="sep">/</span><span id="total">—</span></div>
  </header>

  <section class="viewer">
    <div class="stage" id="stage">
      <div class="ph" id="placeholder"><div class="spinner"></div></div>
      <img id="mainImg" alt="佳代子" decoding="async" />
    </div>

    <div class="controls">
      <button class="btn icon" id="btnPrev" aria-label="上一张" title="上一张 (←)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="btn icon primary" id="btnRandom" aria-label="随机一张" title="随机 (R)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6C13.6 6.6 14.8 6 16.1 6H22"/><path d="M18 2l4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.5-.6-3.3-1.7l-.5-.7"/><path d="M18 14l4 4-4 4"/></svg>
      </button>
      <button class="btn icon" id="btnNext" aria-label="下一张" title="下一张 (→)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="numwrap">
        <input id="numInput" type="number" min="1" inputmode="numeric" placeholder="编号" aria-label="图片编号" />
        <button class="go" id="btnGo" aria-label="前往该编号" title="前往">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
        </button>
      </div>
      <button class="btn icon" id="btnCopy" aria-label="复制图片链接" title="复制链接" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      </button>
      <button class="btn icon" id="btnDownload" aria-label="下载当前图片" title="下载图片 (D)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </section>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  // ===== 配置：仅参考自 jrrp.js 的图床地址，与 bot 运行时完全解耦 =====
  const CONFIG = {
    BASE_URL: 'https://kayoko-1343642582.cos.ap-chongqing.myqcloud.com/kayoko/kayoko_',
    EXTENSIONS: ['png', 'jpg', 'jpeg', 'webp', 'gif'],
    DEFAULT_MAX: 930,              // 首次打开或探测失败时使用
    PROBE_INTERVAL: 6 * 60 * 60 * 1000, // 每个浏览器最多每 6 小时复检一次
    PROBE_DELAY: 150,              // 探测请求严格串行，避免触发 COS 限流
    PROBE_TIMEOUT: 5000
  };

  const state = {
    max: CONFIG.DEFAULT_MAX,
    current: null,
    ready: false,
    extCache: Object.create(null)
  };

  const $ = (id) => document.getElementById(id);
  const mainImg = $('mainImg');
  const placeholder = $('placeholder');
  const numInput = $('numInput');
  const curIdEl = $('curId');
  const totalEl = $('total');
  const actionBtns = [$('btnPrev'), $('btnRandom'), $('btnNext'), $('btnGo'), $('btnCopy'), $('btnDownload')];

  // ===== 工具 =====
  const pad = (id) => String(id).padStart(3, '0');
  const urlOf = (id, ext) => CONFIG.BASE_URL + pad(id) + '.' + ext;

  // 给 <img> 设 src，按扩展名顺序回退
  function applyImgWithFallback(img, id, srcFn, onLoad, onFail) {
    let settled = false;
    const done = (ok, ext) => {
      if (settled) return;
      settled = true;
      if (ok) { state.extCache[id] = ext; if (onLoad) onLoad(ext); }
      else if (onFail) onFail();
    };
    // 已成功加载过的编号优先使用其扩展名，失败再走完整回退
    const known = state.extCache[id];
    const exts = known ? [known, ...CONFIG.EXTENSIONS.filter(function(e) { return e !== known; })] : CONFIG.EXTENSIONS.slice();
    let idx = 0;
    const tryNext = () => {
      if (idx >= exts.length) { done(false); return; }
      const ext = exts[idx++];
      img.onload = () => done(true, ext);
      img.onerror = () => {
        // 关键修复：COS 会因 Referer/CORS 校验或连接过多强制关闭连接（ERR_CONNECTION_CLOSED）
        // 遇到网络重置或连接关闭，稍作延迟后重试当前格式，若重试 1 次仍然失败再走下一个格式
        if (img.dataset.retry === ext) {
          img.removeAttribute('data-retry');
          // COS 连接关闭时，等 300ms 再试下一个扩展名，让连接池释放
          setTimeout(tryNext, 300);
        } else {
          img.dataset.retry = ext;
          setTimeout(() => {
            img.src = srcFn(id, ext) + (srcFn(id, ext).includes('?') ? '&' : '?') + 't=' + Math.random().toString(36).slice(2, 6);
          }, 200);
        }
      };
      img.src = srcFn(id, ext);
    };
    tryNext();
  }

  // ===== 低流量数量探测 =====
  const COUNT_CACHE_KEY = 'jrrp_count_v2';
  const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  function loadCountCache() {
    try {
      const parsed = JSON.parse(localStorage.getItem(COUNT_CACHE_KEY));
      if (parsed && Number.isInteger(parsed.max) && parsed.max > 0) return parsed;
    } catch (_) {}
    return null;
  }

  function saveCountCache(max) {
    try {
      localStorage.setItem(COUNT_CACHE_KEY, JSON.stringify({ max: max, checkedAt: Date.now() }));
    } catch (_) {}
  }

  // true：存在；false：明确不存在；null：网络异常，终止本轮探测
  async function probeId(id) {
    for (let i = 0; i < CONFIG.EXTENSIONS.length; i++) {
      const ext = CONFIG.EXTENSIONS[i];
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), CONFIG.PROBE_TIMEOUT);
      try {
        const response = await fetch(urlOf(id, ext), {
          method: 'HEAD',
          cache: 'no-store',
          signal: controller.signal
        });
        if (response.ok) {
          state.extCache[id] = ext;
          return true;
        }
        if (response.status !== 404) return null;
      } catch (_) {
        return null;
      } finally {
        clearTimeout(timer);
      }
      if (i + 1 < CONFIG.EXTENSIONS.length) await delay(CONFIG.PROBE_DELAY);
    }
    return false;
  }

  async function detectMax(start) {
    // 先确认当前上限；若配置或缓存偏大，再向下二分校正。
    let status = await probeId(start);
    if (status === null) return null;
    if (!status) {
      let low = 1;
      let high = start - 1;
      let found = 0;
      while (low <= high) {
        await delay(CONFIG.PROBE_DELAY);
        const mid = Math.floor((low + high) / 2);
        status = await probeId(mid);
        if (status === null) return null;
        if (status) { found = mid; low = mid + 1; }
        else high = mid - 1;
      }
      return found || null;
    }

    // 先看下一张；没有新增时只检查当前上限和下一个编号。
    await delay(CONFIG.PROBE_DELAY);
    status = await probeId(start + 1);
    if (status === null) return null;
    if (!status) return start;

    // 有多张新增时用指数搜索 + 二分查找，避免逐张请求。
    let low = start + 1;
    let step = 2;
    let high;
    while (true) {
      await delay(CONFIG.PROBE_DELAY);
      const candidate = start + step;
      status = await probeId(candidate);
      if (status === null) return null;
      if (!status) { high = candidate - 1; break; }
      low = candidate;
      step *= 2;
    }
    while (low < high) {
      await delay(CONFIG.PROBE_DELAY);
      const mid = Math.floor((low + high + 1) / 2);
      status = await probeId(mid);
      if (status === null) return null;
      if (status) low = mid;
      else high = mid - 1;
    }
    return low;
  }

  async function refreshCount() {
    const cached = loadCountCache();
    if (cached && Date.now() - cached.checkedAt < CONFIG.PROBE_INTERVAL) return;

    const detected = await detectMax(state.max);
    // 网络异常时保留可信的旧值，同时记录本次尝试以避免反复请求。
    if (detected === null) {
      saveCountCache(state.max);
      return;
    }
    if (detected !== state.max) {
      state.max = detected;
      updateRollingCounter(totalEl, detected);
      numInput.max = detected;
      toast('图库数量已更新为 ' + detected);
    }
    saveCountCache(detected);
  }

  // ===== 滚动数字计数器（slot-machine 风格）=====
  let rollCounterInited = false;
  let rollDigitEls = [];
  let rollCurrentDigits = [];

  function updateRollingCounter(el, value) {
    const str = String(value);
    const digits = str.split('').map(Number);

    if (!rollCounterInited) {
      el.innerHTML = '';
      el.className = 'roll-counter';
      digits.forEach(function(digit) {
        var d = document.createElement('span');
        d.className = 'roll-digit';
        var strip = document.createElement('span');
        strip.className = 'roll-strip';
        for (var i = 0; i <= 9; i++) {
          var s = document.createElement('span');
          s.textContent = i;
          strip.appendChild(s);
        }
        d.appendChild(strip);
        el.appendChild(d);
        strip.style.transition = 'none';
        strip.style.transform = 'translateY(-' + digit + 'em)';
        rollDigitEls.push({ el: d, strip: strip });
        rollCurrentDigits.push(digit);
      });
      rollCounterInited = true;
      return;
    }

    while (rollDigitEls.length < digits.length) {
      var idx = rollDigitEls.length;
      var d = document.createElement('span');
      d.className = 'roll-digit';
      var strip = document.createElement('span');
      strip.className = 'roll-strip';
      for (var i = 0; i <= 9; i++) {
        var s = document.createElement('span');
        s.textContent = i;
        strip.appendChild(s);
      }
      d.appendChild(strip);
      el.appendChild(d);
      strip.style.transition = 'none';
      strip.style.transform = 'translateY(0em)';
      rollDigitEls.push({ el: d, strip: strip });
      rollCurrentDigits.push(0);
    }

    while (rollDigitEls.length > digits.length) {
      var last = rollDigitEls.pop();
      last.el.remove();
      rollCurrentDigits.pop();
    }

    digits.forEach(function(digit, idx) {
      var d = rollDigitEls[idx];
      var oldDigit = rollCurrentDigits[idx];
      if (oldDigit === digit) return;
      var delay = (digits.length - 1 - idx) * 60;
      d.strip.style.transition = 'none';
      d.strip.style.transform = 'translateY(-' + oldDigit + 'em)';
      void d.strip.offsetHeight;
      d.strip.style.transition = 'transform 0.35s cubic-bezier(0.16, 1, 0.3, 1) ' + delay + 'ms';
      d.strip.style.transform = 'translateY(-' + digit + 'em)';
      rollCurrentDigits[idx] = digit;
    });
  }

  // ===== 单图加载 =====
  function setCurrent(id) { state.current = id; curIdEl.textContent = pad(id); }

  function loadImage(id, onGap) {
    id = parseInt(id, 10);
    if (!id || id < 1 || id > state.max) { toast('编号需在 1 ~ ' + state.max); return; }
    placeholder.classList.remove('hide');
    mainImg.classList.remove('show');
    applyImgWithFallback(mainImg, id, urlOf,
      () => { placeholder.classList.add('hide'); mainImg.classList.add('show'); setCurrent(id); },
      () => { if (onGap) onGap(); else setCurrent(id); }
    );
  }

  function randomImage(r) {
    if (!state.ready) return;
    r = r || 0;
    if (state.max < 1) return;
    let id = Math.floor(Math.random() * state.max) + 1;
    if (id === state.current && state.max > 1) id = (id % state.max) + 1;
    loadImage(id, () => (r < 8 ? randomImage(r + 1) : setCurrent(id)));
  }

  function prevImage() { if (!state.ready) return; const c = state.current || 2; loadImage(c <= 1 ? state.max : c - 1); }
  function nextImage() { if (!state.ready) return; const c = state.current || 0; loadImage(c >= state.max ? 1 : c + 1); }

  function gotoSpecified() {
    if (!state.ready) return;
    const v = numInput.value.trim();
    if (!v) { numInput.focus(); return; }
    loadImage(parseInt(v, 10));
  }

  // ===== Toast =====
  const toastEl = $('toast');
  let toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  function setBusy(busy) {
    state.ready = !busy;
    actionBtns.forEach((b) => { b.disabled = busy; });
    numInput.disabled = busy;
  }

  // ===== 事件 =====
  $('btnRandom').addEventListener('click', () => randomImage());
  $('btnPrev').addEventListener('click', prevImage);
  $('btnNext').addEventListener('click', nextImage);
  $('btnGo').addEventListener('click', gotoSpecified);
  numInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') gotoSpecified(); });
  $('btnCopy').addEventListener('click', async () => {
    if (!state.ready || state.current == null) { toast('暂无图片'); return; }
    const ext = state.extCache[state.current];
    if (!ext) { toast('当前为空缺位'); return; }
    const link = urlOf(state.current, ext);
    try { await navigator.clipboard.writeText(link); toast('已复制链接'); }
    catch (_) { toast(link); }
  });
  $('btnDownload').addEventListener('click', async () => {
    if (!state.ready || state.current == null) { toast('暂无图片'); return; }
    const ext = state.extCache[state.current];
    if (!ext) { toast('当前为空缺位'); return; }
    const link = urlOf(state.current, ext);
    const fileName = 'kayoko_' + pad(state.current) + '.' + ext;
    toast('开始下载...');
    try {
      const res = await fetch(link);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      // 跨域或网络错误时，回退到在新窗口打开图片
      window.open(link, '_blank');
      toast('已在新窗口打开，请长按或右键保存');
    }
  });
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === numInput) return;
    if (e.key === 'r' || e.key === 'R') { randomImage(); return; }
    if (e.key === 'd' || e.key === 'D') { $('btnDownload').click(); return; }
    if (!state.ready) return;
    if (e.key === 'ArrowLeft') prevImage();
    else if (e.key === 'ArrowRight') nextImage();
  });

  // ===== 初始化：先使用缓存数量，随后在后台低频复检 =====
  (function init() {
    setBusy(true);
    placeholder.classList.remove('hide');
    const cached = loadCountCache();
    if (cached) state.max = cached.max;
    updateRollingCounter(totalEl, state.max);
    numInput.max = state.max;
    setBusy(false);
    randomImage();
    setTimeout(refreshCount, 1200);
  })();
})();
</script>
</body>
</html>
